<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Mundo Viajero</title>

  <link rel="stylesheet" href="https://bootswatch.com/4/cerulean/bootstrap.min.css">

  <style>
    body {
      background: url('/asset/img/viaje.jpg') center/cover no-repeat;
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
    }

    .login-box {
      background-color: rgba(255, 255, 255, 0.9);
      padding: 30px;
      border-radius: 10px;
      width: 350px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    h2 {
      color: #54362D;
      margin-bottom: 20px;
    }

    .form-control {
      margin-bottom: 15px;
    }

    .btn-primary {
      background-color: #54362D;
      border-color: #54362D;
      width: 100%;
    }

    .btn-primary:hover {
      background-color: #FFDB93;
      color: black;
      border-color: #FFDB93;
    }

    .text-error {
      color: red;
      font-size: 14px;
    }

    .registro-link {
      margin-top: 15px;
      font-size: 14px;
    }

    .registro-link a {
      color: #54362D;
      cursor: pointer;
      text-decoration: underline;
      transition: color 0.3s;
    }

    .registro-link a:hover {
      color: #FFDB93;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .modal-content {
      background-color: white;
      padding: 30px;
      border-radius: 10px;
      width: 350px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
      text-align: center;
    }

    .modal-content h2 {
      margin-bottom: 20px;
      color: #54362D;
    }

    .modal-content .form-control {
      margin-bottom: 15px;
    }

    .modal-content .btn {
      width: 48%;
    }

    .modal-content .btn + .btn {
      margin-left: 4%;
    }

    @media (max-width: 400px) {
      .modal-content .btn {
        width: 100%;
        margin-bottom: 10px;
      }

      .modal-content .btn + .btn {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Iniciar Sesión</h2>
    <input type="email" id="correo" class="form-control" placeholder="Correo" required>
    <input type="password" id="password" class="form-control" placeholder="Contraseña" required>

    <button class="btn btn-primary" onclick="login()">Ingresar</button>

    <p class="registro-link">¿No estás registrado? <a onclick="toggleRegister()">Regístrate</a></p>

    <p id="error-msg" class="text-error"></p>
  </div>

  <!-- Modal de Registro -->
  <div id="register-form" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <h2>Registro</h2>
      <input type="text" id="reg-nombre" class="form-control" placeholder="Nombre completo" required>
      <input type="email" id="reg-correo" class="form-control" placeholder="Correo electrónico" required>
      <input type="password" id="reg-password" class="form-control" placeholder="Contraseña" required>
      <div class="d-flex justify-content-between mt-3">
        <button class="btn btn-primary" onclick="registrarUsuario()">Registrar</button>
        <button class="btn btn-secondary" onclick="toggleRegister()">Cancelar</button>
      </div>
      <p id="registro-msg" class="text-error mt-2"></p>
    </div>
  </div>

  <script src="../../js/ProyectoFinal/login.js"></script>
</body>
</html>
